name: yield-engine-web-prod

on:
  push:
    branches: [prod]

env:
  CONTAINER_APP_NAME: yield-engine-web-prod
  IMAGE_NAME: ghcr.io/anilmodest/yield-engine-web-prod
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL_PROD }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL_PROD }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.YIELDENGINEWEB_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.YIELDENGINEWEB_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.YIELDENGINEWEB_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.YIELDENGINEWEB_REGISTRY_USERNAME }}
          password: ${{ secrets.YIELDENGINEWEB_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL_PROD }} \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        run: |
          sed -i "s|PLACEHOLDER_SHA|${{ github.sha }}|g" .github/deploy/containerapp.yml
          sed -i "s|yield-engine-web|yield-engine-web-prod|g" .github/deploy/containerapp.yml
          sed -i "s|PLACEHOLDER_API_URL|${{ vars.VITE_API_BASE_URL_PROD }}|g" .github/deploy/containerapp.yml
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group YieldEngine \
            --yaml .github/deploy/containerapp.yml
